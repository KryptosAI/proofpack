services:
  - type: web
    name: proofpack
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: STRIPE_SECRET_KEY
        value: SET_IN_RENDER_DASHBOARD
      - key: STRIPE_WEBHOOK_SECRET
        value: SET_IN_RENDER_DASHBOARD
      - key: APP_BASE_URL
        value: https://proofpack.onrender.com
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
